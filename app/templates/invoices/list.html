{% extends "base.html" %}
{% block title %}Invoices — {{ business_name }}{% endblock %}

{% block content %}
<div class="page-head">
  <h1>Invoices</h1>
  <div class="actions">
    <a href="{{ url_for('invoices.new_invoice') }}" role="button" class="contrast">+ New invoice</a>
  </div>
</div>

<form method="get" class="search-row mb-2">
  {% if status %}<input type="hidden" name="status" value="{{ status }}">{% endif %}
  <input type="search"
         name="q"
         value="{{ q }}"
         placeholder="Search by subject, invoice #, or client…"
         aria-label="Search invoices"
         hx-get="{{ url_for('invoices.list_invoices') }}{% if status %}?status={{ status }}{% endif %}"
         hx-trigger="keyup changed delay:300ms, search"
         hx-target="#invoice-cards"
         hx-select="#invoice-cards"
         hx-swap="outerHTML"
         hx-indicator="closest form">
  <span class="htmx-spinner" aria-hidden="true"
        class="htmx-spinner-anchor"></span>
</form>

<div class="btn-row mb-2">
  <a href="{{ url_for('invoices.list_invoices') }}" role="button"
     class="{{ 'contrast' if not status else 'secondary outline' }}">All</a>
  {% for s in statuses %}
    <a href="{{ url_for('invoices.list_invoices', status=s) }}" role="button"
       class="{{ 'contrast' if status == s else 'secondary outline' }}">{{ status_labels[s] }}</a>
  {% endfor %}
  <a href="{{ url_for('invoices.list_invoices', status='overdue') }}" role="button"
     class="{{ 'contrast' if status == 'overdue' else 'secondary outline' }}"
     style="color:var(--lo-danger)">Overdue</a>
</div>

{% include "invoices/_cards.html" %}
{% endblock %}
