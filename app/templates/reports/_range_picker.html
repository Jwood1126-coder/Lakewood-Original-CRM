{# Shared date-range picker for reports. Expects: d_from, d_to, presets. #}
<form method="get" class="card mb-2">
  <div class="grid">
    <div>
      <label for="from">From</label>
      <input type="date" id="from" name="from" value="{{ d_from.isoformat() }}">
    </div>
    <div>
      <label for="to">To</label>
      <input type="date" id="to" name="to" value="{{ d_to.isoformat() }}">
    </div>
  </div>
  <div class="btn-row mt-1">
    <button type="submit" class="contrast">Apply</button>
    <a href="?from={{ presets.this_month_start.isoformat() }}&to={{ presets.today.isoformat() }}"
       role="button" class="secondary outline">This month</a>
    <a href="?from={{ presets.last_month_start.isoformat() }}&to={{ presets.last_month_end.isoformat() }}"
       role="button" class="secondary outline">Last month</a>
    <a href="?from={{ presets.ytd_start.isoformat() }}&to={{ presets.today.isoformat() }}"
       role="button" class="secondary outline">YTD</a>
    <a href="?from={{ presets.last_year_start.isoformat() }}&to={{ presets.last_year_end.isoformat() }}"
       role="button" class="secondary outline">Last year</a>
  </div>
</form>
