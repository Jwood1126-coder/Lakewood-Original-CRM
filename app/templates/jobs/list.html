{% extends "base.html" %}
{% block title %}Jobs — {{ business_name }}{% endblock %}

{% block content %}
<div class="page-head">
  <h1>Jobs</h1>
  <div class="actions">
    <a href="{{ url_for('jobs.new_job') }}" role="button" class="contrast">+ New job</a>
  </div>
</div>

<form method="get" class="search-row mb-2">
  {% if status %}<input type="hidden" name="status" value="{{ status }}">{% endif %}
  <input type="search"
         name="q"
         value="{{ q }}"
         placeholder="Search by title, client, or scope…"
         aria-label="Search jobs"
         hx-get="{{ url_for('jobs.list_jobs') }}{% if status %}?status={{ status }}{% endif %}"
         hx-trigger="keyup changed delay:300ms, search"
         hx-target="#job-cards"
         hx-select="#job-cards"
         hx-swap="outerHTML"
         hx-indicator="closest form">
  <span class="htmx-spinner" aria-hidden="true"
        class="htmx-spinner-anchor"></span>
</form>

<div class="btn-row mb-2">
  <a href="{{ url_for('jobs.list_jobs') }}" role="button"
     class="{{ 'contrast' if not status else 'secondary outline' }}">All</a>
  {% for s in statuses %}
    <a href="{{ url_for('jobs.list_jobs', status=s) }}" role="button"
       class="{{ 'contrast' if status == s else 'secondary outline' }}">{{ status_labels[s] }}</a>
  {% endfor %}
</div>

{% include "jobs/_cards.html" %}
{% endblock %}
