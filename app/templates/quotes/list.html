{% extends "base.html" %}
{% block title %}Estimates — {{ business_name }}{% endblock %}

{% block content %}
<div class="page-head">
  <h1>Estimates</h1>
  <div class="actions">
    <a href="{{ url_for('quotes.new_quote') }}" role="button" class="contrast">+ New estimate</a>
  </div>
</div>

<form method="get" class="search-row mb-2">
  {% if status %}<input type="hidden" name="status" value="{{ status }}">{% endif %}
  <input type="search"
         name="q"
         value="{{ q }}"
         placeholder="Search by subject, E-#, or client…"
         aria-label="Search estimates"
         hx-get="{{ url_for('quotes.list_quotes') }}{% if status %}?status={{ status }}{% endif %}"
         hx-trigger="keyup changed delay:300ms, search"
         hx-target="#quote-cards"
         hx-select="#quote-cards"
         hx-swap="outerHTML"
         hx-indicator="closest form">
  <span class="htmx-spinner" aria-hidden="true"
        class="htmx-spinner-anchor"></span>
</form>

<div class="btn-row mb-2">
  <a href="{{ url_for('quotes.list_quotes') }}" role="button"
     class="{{ 'contrast' if not status else 'secondary outline' }}">All</a>
  {% for s in statuses %}
    <a href="{{ url_for('quotes.list_quotes', status=s) }}" role="button"
       class="{{ 'contrast' if status == s else 'secondary outline' }}">{{ status_labels[s] }}</a>
  {% endfor %}
</div>

{% include "quotes/_cards.html" %}
{% endblock %}
